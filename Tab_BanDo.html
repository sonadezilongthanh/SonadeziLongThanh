<script>
/***********************************************************************
 * BẢN ĐỒ 2 CẤP — v2.8
 *
 *  CẤP 1 (Toàn cảnh KCN) hiển thị ĐỒNG THỜI:
 *     • Vùng CỤM xưởng   → DS_Cum.ToaDoSVG               → bấm = drill-down
 *     • Vùng LÔ ĐẤT CN   → DS_NhaXuong có MaCum = 'KCN'  → bấm = mở chi tiết ngay
 *
 *  CẤP 2 (Mặt bằng cụm): các nhà xưởng trong cụm
 *
 *  ★ V2.5: Đồng bộ tô màu vùng CỤM theo bộ lọc hiện hành (KET_QUA_LOC).
 *  ★ V2.6: Nút cảnh báo hợp đồng sắp hết hạn (≤ 6 tháng).
 *  ★ V2.7: Sửa lỗi nút cảnh báo đè lên header (bỏ position:absolute);
 *          cập nhật badge ở cả 2 cấp bản đồ.
 *  ★ V2.8: (1) SỬA LỖI "mất chuông": cột ThoiHanThue_ChiTiet đã được gộp về
 *              ThoiHanThue nên hàm cũ luôn trả về 0 -> nút bị ẩn hoàn toàn.
 *              Nay đọc theo thứ tự ưu tiên NgayHetHanHD -> ThoiHanThue ->
 *              NgayHopDong + số năm; và nút KHÔNG tự ẩn nữa (chỉ chuyển xám).
 *          (2) THÊM cảnh báo kỷ niệm ngày thành lập khách thuê (trước 7 ngày)
 *              để kịp chuẩn bị lẵng hoa chúc mừng.
 ***********************************************************************/
const MA_CUM_KCN = 'KCN';   // mã đặc biệt: vẽ thẳng trên bản đồ tổng

/* ★ V2.4: Bảng màu CỤM — đồng bộ bộ màu mềm với sheet DM_TrangThai. */
const MAU_CUM = {
  trongHoanToan : '#16a34a',   // Còn trống hoàn toàn  — xanh lá (cơ hội)
  trongMotPhan  : '#d97706',   // Còn trống một phần   — hổ phách
  daLapDay      : '#4a6fa5',   // Đã lấp đầy           — xanh dương trung tính
  chuaCoDuLieu  : '#94a3b8'    // Chưa có dữ liệu      — xám nhạt
};

/***********************************************************************
 * ★ V2.8 — TIỆN ÍCH NGÀY THÁNG DÙNG CHUNG CHO CẢ 2 LOẠI CẢNH BÁO
 ***********************************************************************/

/**
 * Đọc 1 ngày từ giá trị bất kỳ trong Sheet.
 * Hỗ trợ: đối tượng Date, chuỗi ISO (2016-04-20...), dd/MM/yyyy, dd-MM-yyyy.
 * Lưu ý: dữ liệu cũ có lẫn định dạng MM/dd/yyyy (VD 11/30/2005) nên:
 *   - nếu số thứ nhất > 12  -> chắc chắn là NGÀY/THÁNG
 *   - nếu số thứ hai  > 12  -> là THÁNG/NGÀY
 *   - còn lại mặc định hiểu theo chuẩn Việt Nam dd/MM
 */
function docNgay_(giaTri) {
  if (giaTri === null || giaTri === undefined || giaTri === '') return null;

  if (giaTri instanceof Date) {
    return isNaN(giaTri.getTime())
      ? null
      : new Date(giaTri.getFullYear(), giaTri.getMonth(), giaTri.getDate());
  }

  const s = String(giaTri).trim();
  if (!s) return null;

  // ISO: 2016-04-20 hoặc 2016-04-20T00:00:00.000Z
  let m = s.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (m) return new Date(+m[1], +m[2] - 1, +m[3]);

  // dd/MM/yyyy | dd-MM-yyyy | dd.MM.yyyy
  m = s.match(/(\d{1,2})\s*[\/\-.]\s*(\d{1,2})\s*[\/\-.]\s*(\d{4})/);
  if (m) {
    const a = +m[1], b = +m[2], nam = +m[3];
    let ngay, thang;
    if (a > 12)      { ngay = a; thang = b; }
    else if (b > 12) { ngay = b; thang = a; }
    else             { ngay = a; thang = b; }   // mặc định dd/MM
    if (thang < 1 || thang > 12 || ngay < 1 || ngay > 31) return null;
    return new Date(nam, thang - 1, ngay);
  }
  return null;
}

function dinhDangNgay_(d) {
  const dd = String(d.getDate()).padStart(2, '0');
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  return dd + '/' + mm + '/' + d.getFullYear();
}

/** Chống lỗi hiển thị khi tên khách thuê có ký tự < > & */
function thoat_(t) {
  return String(t === null || t === undefined ? '' : t)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function homNay_() {
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  return d;
}


/***********************************************************************
 * CẢNH BÁO 1 — HỢP ĐỒNG SẮP HẾT HẠN
 *
 *  Thứ tự ưu tiên xác định ngày hết hạn (áp dụng cho CẢ nhà xưởng và đất):
 *    (1) Cột NgayHetHanHD   — chuẩn nhất, khuyến nghị nhập đủ cột này
 *    (2) Cột ThoiHanThue    — nếu ghi ngày đầy đủ (VD 01/10/2053) hoặc chuỗi
 *                             có chứa năm 4 chữ số (quy ước hết hạn 31/12)
 *    (3) NgayHopDong + số năm ghi trong ThoiHanThue (VD "5 năm", "50 năm")
 ***********************************************************************/
const SO_NGAY_CANH_BAO = 180; // ~ 6 tháng

function phanTichHanThue_(nx) {
  // (1) Cột ngày hết hạn hợp đồng
  let d = docNgay_(nx.NgayHetHanHD);
  if (d) return { ngay: d, suyRa: '' };

  // Cột thời hạn thuê: tên cột đã gộp về "ThoiHanThue"; vẫn đọc dự phòng tên cũ
  const chuoiHan = String(nx.ThoiHanThue || nx.ThoiHanThue_ChiTiet || '').trim();

  // (2a) Thời hạn thuê ghi thẳng bằng một ngày cụ thể
  d = docNgay_(chuoiHan);
  if (d) return { ngay: d, suyRa: '' };

  // (2b) Chuỗi mô tả có chứa năm 4 chữ số -> lấy năm CUỐI CÙNG, quy ước 31/12
  const dsNam = chuoiHan.match(/\b(19|20|21)\d{2}\b/g);
  if (dsNam && dsNam.length > 0) {
    return { ngay: new Date(+dsNam[dsNam.length - 1], 11, 31), suyRa: 'ước theo năm' };
  }

  // (3) "N năm" cộng từ ngày hợp đồng
  const mNam   = chuoiHan.match(/(\d{1,3})\s*n[ăa]m/i);
  const ngayHD = docNgay_(String(nx.NgayHopDong || '').split(',')[0]);
  if (mNam && ngayHD) {
    const kq = new Date(ngayHD.getTime());
    kq.setFullYear(kq.getFullYear() + (+mNam[1]));
    return { ngay: kq, suyRa: 'tính từ ngày HĐ' };
  }

  return null;
}

/** Quét DU_LIEU.nhaXuong, trả danh sách hợp đồng còn ≤ 6 tháng, gần hạn nhất trước */
function tinhDanhSachCanhBao_() {
  const nay = homNay_();
  const ds  = [];

  (DU_LIEU.nhaXuong || []).forEach(function (nx) {
    const kq = phanTichHanThue_(nx);
    if (!kq) return;

    const soNgay = Math.round((kq.ngay - nay) / 86400000);
    if (soNgay >= 0 && soNgay <= SO_NGAY_CANH_BAO) {
      ds.push({
        ma        : nx.MaDonVi,
        ten       : nx.TenNhaXuong || nx.MaDonVi,
        khachThue : nx.KhachThue || '(chưa có tên khách thuê)',
        ngayHetHan: kq.ngay,
        suyRa     : kq.suyRa,
        soNgay    : soNgay
      });
    }
  });

  ds.sort(function (a, b) { return a.soNgay - b.soNgay; });
  return ds;
}


/***********************************************************************
 * ★ V2.8 — CẢNH BÁO 2: KỶ NIỆM NGÀY THÀNH LẬP KHÁCH THUÊ
 *
 *  Nguồn ngày thành lập, theo thứ tự ưu tiên:
 *    (1) Cột NgayThanhLap  — CỘT MỚI, cần bổ sung vào sheet DS_NhaXuong,
 *                            nhập dạng dd/MM/yyyy. Đây là nguồn chính xác nhất.
 *    (2) Ngày ĐẦU TIÊN tìm thấy trong cột GiayCNDN (Giấy CN đăng ký doanh nghiệp)
 *    (3) Ngày ĐẦU TIÊN tìm thấy trong cột GiayCNDT (Giấy CN đầu tư)
 *  Trường hợp (2)(3) chỉ là SUY RA từ văn bản — có thể là ngày đăng ký thay đổi
 *  chứ không phải ngày thành lập gốc -> hiển thị kèm ghi chú "cần đối chiếu".
 *
 *  Nhiều lô cùng một khách thuê (VD Framas có 4 nhà xưởng) chỉ tính 1 lần.
 ***********************************************************************/
const SO_NGAY_BAO_SINH_NHAT = 7;   // báo trước 7 ngày để kịp đặt lẵng hoa

function docNgayThanhLap_(nx) {
  let d = docNgay_(nx.NgayThanhLap);
  if (d) return { ngay: d, suyRa: '' };

  d = docNgay_(nx.GiayCNDN);
  if (d) return { ngay: d, suyRa: 'suy ra từ Giấy CNĐKDN — cần đối chiếu' };

  d = docNgay_(nx.GiayCNDT);
  if (d) return { ngay: d, suyRa: 'suy ra từ Giấy CNĐT — cần đối chiếu' };

  return null;
}

/** Ngày kỷ niệm gần nhất kể từ hôm nay (nếu năm nay đã qua thì lấy năm sau) */
function ngayKyNiemToi_(ngayGoc, nay) {
  let kn = new Date(nay.getFullYear(), ngayGoc.getMonth(), ngayGoc.getDate());
  if (kn < nay) kn = new Date(nay.getFullYear() + 1, ngayGoc.getMonth(), ngayGoc.getDate());
  return kn;
}

function tinhDanhSachSinhNhat_() {
  const nay  = homNay_();
  const daCo = {};      // gộp theo tên khách thuê để không báo trùng
  const ds   = [];

  (DU_LIEU.nhaXuong || []).forEach(function (nx) {
    const khach = String(nx.KhachThue || '').trim();
    if (!khach) return;                       // lô trống thì không tính

    const goc = docNgayThanhLap_(nx);
    if (!goc) return;

    const khoa = khach.toLowerCase() + '|' + goc.ngay.getMonth() + '-' + goc.ngay.getDate();
    if (daCo[khoa]) {
      if (daCo[khoa].dsMa.indexOf(nx.MaDonVi) === -1) daCo[khoa].dsMa.push(nx.MaDonVi);
      return;
    }

    const kn     = ngayKyNiemToi_(goc.ngay, nay);
    const soNgay = Math.round((kn - nay) / 86400000);
    if (soNgay < 0 || soNgay > SO_NGAY_BAO_SINH_NHAT) return;

    const muc = {
      khachThue   : khach,
      ngayThanhLap: goc.ngay,
      ngayKyNiem  : kn,
      soNam       : kn.getFullYear() - goc.ngay.getFullYear(),
      soNgay      : soNgay,
      suyRa       : goc.suyRa,
      dsMa        : [nx.MaDonVi]
    };
    daCo[khoa] = muc;
    ds.push(muc);
  });

  ds.sort(function (a, b) { return a.soNgay - b.soNgay; });
  return ds;
}


/***********************************************************************
 * CẬP NHẬT BADGE & MỞ / ĐÓNG MODAL
 ***********************************************************************/
function capNhatBadgeCanhBao() {
  /* --- Cảnh báo hợp đồng --- */
  const ds = tinhDanhSachCanhBao_();
  window.__DS_CANH_BAO__ = ds;

  const nut = document.getElementById('nutCanhBao');
  if (nut) {
    nut.classList.remove('an');                    // ★ V2.8: không ẩn nút nữa
    nut.classList.toggle('rong', ds.length === 0);
    const elSo = document.getElementById('soLuongCanhBao');
    if (elSo) elSo.textContent = ds.length;
  }

  /* --- ★ V2.8: Cảnh báo kỷ niệm thành lập --- */
  const dsSN = tinhDanhSachSinhNhat_();
  window.__DS_SINH_NHAT__ = dsSN;

  const nutSN = document.getElementById('nutSinhNhat');
  if (nutSN) {
    nutSN.classList.remove('an');
    nutSN.classList.toggle('rong', dsSN.length === 0);
    const elSoSN = document.getElementById('soLuongSinhNhat');
    if (elSoSN) elSoSN.textContent = dsSN.length;
  }
}

/** Mở modal liệt kê hợp đồng sắp hết hạn; bấm 1 dòng sẽ nhảy tới lô đó trên bản đồ */
function moModalCanhBao() {
  const ds = window.__DS_CANH_BAO__ || [];
  const noiDung = document.getElementById('noiDungModalCanhBao');

  noiDung.innerHTML = ds.length === 0
    ? '<p class="rong-canh-bao">Không có hợp đồng nào sắp hết hạn trong 6 tháng tới.<br>'
      + '<small>Ngày hết hạn được lấy từ cột <b>NgayHetHanHD</b>, hoặc suy ra từ '
      + '<b>ThoiHanThue</b> / <b>NgayHopDong</b> của sheet DS_NhaXuong.</small></p>'
    : '<table class="bang-canh-bao"><thead><tr>'
      + '<th>Mã lô</th><th>Tên</th><th>Khách thuê</th><th>Hết hạn</th><th>Còn lại</th>'
      + '</tr></thead><tbody>'
      + ds.map(function (d) {
          return '<tr class="' + (d.soNgay <= 30 ? 'khan-cap' : '') + '" '
               + 'onclick="dongModalCanhBao();highlightLoDat(\'' + d.ma + '\');">'
               + '<td>' + thoat_(d.ma) + '</td><td>' + thoat_(d.ten) + '</td>'
               + '<td>' + thoat_(d.khachThue) + '</td>'
               + '<td>' + dinhDangNgay_(d.ngayHetHan)
               +   (d.suyRa ? '<br><span class="suy-ra">(' + d.suyRa + ')</span>' : '')
               + '</td><td>' + d.soNgay + ' ngày</td></tr>';
        }).join('')
      + '</tbody></table>';

  document.getElementById('modalCanhBao').classList.remove('an');
}

function dongModalCanhBao() {
  document.getElementById('modalCanhBao').classList.add('an');
}

/** ★ V2.8: Mở modal kỷ niệm ngày thành lập khách thuê */
function moModalSinhNhat() {
  const ds = window.__DS_SINH_NHAT__ || [];
  const noiDung = document.getElementById('noiDungModalSinhNhat');
  document.getElementById('baoSaoChepSinhNhat').textContent = '';

  noiDung.innerHTML = ds.length === 0
    ? '<p class="rong-canh-bao">Trong 7 ngày tới không có khách thuê nào kỷ niệm ngày thành lập.<br>'
      + '<small>Ngày thành lập lấy từ cột <b>NgayThanhLap</b> (dd/MM/yyyy) của sheet '
      + 'DS_NhaXuong. Nếu cột này trống, hệ thống tạm suy ra từ <b>GiayCNDN</b> / '
      + '<b>GiayCNDT</b> và ghi chú "cần đối chiếu".</small></p>'
    : '<table class="bang-canh-bao"><thead><tr>'
      + '<th>Khách thuê</th><th>Ngày thành lập</th><th>Kỷ niệm</th>'
      + '<th>Ngày tổ chức</th><th>Còn lại</th>'
      + '</tr></thead><tbody>'
      + ds.map(function (d, i) {
          return '<tr class="' + (d.soNgay <= 3 ? 'khan-cap' : '') + '" '
               + 'onclick="chonMucSinhNhat_(' + i + ')">'
               + '<td>' + thoat_(d.khachThue)
               +   '<br><span class="suy-ra">Lô: ' + thoat_(d.dsMa.join(', ')) + '</span></td>'
               + '<td>' + dinhDangNgay_(d.ngayThanhLap)
               +   (d.suyRa ? '<br><span class="suy-ra">(' + d.suyRa + ')</span>' : '')
               + '</td>'
               + '<td>' + d.soNam + ' năm</td>'
               + '<td>' + dinhDangNgay_(d.ngayKyNiem) + '</td>'
               + '<td>' + (d.soNgay === 0 ? 'Hôm nay' : d.soNgay + ' ngày') + '</td></tr>';
        }).join('')
      + '</tbody></table>';

  document.getElementById('modalSinhNhat').classList.remove('an');
}

function dongModalSinhNhat() {
  document.getElementById('modalSinhNhat').classList.add('an');
}

/** Bấm 1 dòng trong modal kỷ niệm -> nhảy tới lô đầu tiên của khách thuê đó */
function chonMucSinhNhat_(i) {
  const d = (window.__DS_SINH_NHAT__ || [])[i];
  if (!d || !d.dsMa.length) return;
  dongModalSinhNhat();
  highlightLoDat(d.dsMa[0]);
}

/** Sao chép danh sách kỷ niệm để gửi bộ phận đặt lẵng hoa */
function saoChepDanhSachSinhNhat() {
  const ds  = window.__DS_SINH_NHAT__ || [];
  const bao = document.getElementById('baoSaoChepSinhNhat');

  if (ds.length === 0) {
    bao.textContent = 'Không có nội dung để sao chép.';
    return;
  }

  const noiDung = 'DANH SÁCH KHÁCH THUÊ KỶ NIỆM NGÀY THÀNH LẬP (07 NGÀY TỚI)\n'
    + 'KCN Long Thành — lập ngày ' + dinhDangNgay_(homNay_()) + '\n\n'
    + ds.map(function (d, i) {
        return (i + 1) + '. ' + d.khachThue + '\n'
             + '   - Ngày thành lập : ' + dinhDangNgay_(d.ngayThanhLap)
             +   (d.suyRa ? ' (' + d.suyRa + ')' : '') + '\n'
             + '   - Kỷ niệm        : ' + d.soNam + ' năm, ngày ' + dinhDangNgay_(d.ngayKyNiem) + '\n'
             + '   - Lô/nhà xưởng   : ' + d.dsMa.join(', ');
      }).join('\n\n');

  const oTam = document.createElement('textarea');
  oTam.value = noiDung;
  oTam.style.position = 'fixed';
  oTam.style.opacity  = '0';
  document.body.appendChild(oTam);
  oTam.select();
  try {
    document.execCommand('copy');
    bao.textContent = '✓ Đã sao chép ' + ds.length + ' khách thuê.';
  } catch (e) {
    bao.textContent = '✕ Trình duyệt chặn sao chép, vui lòng bôi đen và copy thủ công.';
  }
  document.body.removeChild(oTam);
}

let CAP_HIEN_TAI = 'tong';
let CUM_DANG_XEM = null;

const elAnh = document.getElementById('anhNenBanDo');
const elSvg = document.getElementById('svgBanDo');


/* ---------- Dựng SVG ---------- */
function dungSVG(viewBox, anhNen, vungList) {
  elSvg.setAttribute('viewBox', viewBox || '0 0 1000 700');

  if (anhNen) {
    elAnh.src = anhNen;
    elAnh.style.display = 'block';
    elSvg.classList.add('co-anh-nen');
  } else {
    elAnh.style.display = 'none';
    elSvg.classList.remove('co-anh-nen');
  }

  elSvg.innerHTML = vungList.map(function (v) {
    const t = tamPolygon(v.diem);
    const cls = 'vung-bam'
              + (v.loai === 'cum' ? ' la-cum' : '')
              + (v.mo ? ' mo' : '');
    return '<polygon class="' + cls + '" data-ma="' + v.ma + '" data-loai="' + v.loai + '" '
         +   'points="' + v.diem + '" fill="' + v.mau + '"><title>' + v.tip + '</title></polygon>'
         + '<text class="nhan-vung" x="' + t.x + '" y="' + t.y + '">' + v.nhan + '</text>'
         + (v.nhanPhu
             ? '<text class="nhan-phu" x="' + t.x + '" y="' + (t.y + 17) + '">' + v.nhanPhu + '</text>'
             : '');
  }).join('');

  // Dispatcher: cụm -> drill-down | nhà xưởng & lô đất -> panel chi tiết
  elSvg.querySelectorAll('.vung-bam').forEach(function (p) {
    p.onclick = function () {
      if (p.dataset.loai === 'cum') moCum(p.dataset.ma);
      else                          moPanelChiTiet(p.dataset.ma);
    };
  });
}

function tamPolygon(chuoi) {
  const ds = String(chuoi).trim().split(/\s+/).map(function (c) {
    const p = c.split(',');
    return [parseFloat(p[0]), parseFloat(p[1])];
  });
  const n = ds.length || 1;
  return {
    x: ds.reduce(function (s, p) { return s + p[0]; }, 0) / n,
    y: ds.reduce(function (s, p) { return s + p[1]; }, 0) / n
  };
}


/***********************************************************************
 * CẤP 1 — TOÀN CẢNH KCN  (cụm xưởng + lô đất công nghiệp)
 ***********************************************************************/
function veBanDoTong() {
  CAP_HIEN_TAI = 'tong';
  CUM_DANG_XEM = null;

  document.getElementById('ddPhanCach').classList.add('an');
  document.getElementById('ddTenCum').classList.add('an');

  const ch = DU_LIEU.cauHinh || {};
  const maKhopLoc = KET_QUA_LOC.map(function (n) { return n.MaDonVi; });

  const vung = [];

  // --- (a) Vùng CỤM xưởng ---
  (DU_LIEU.cum || []).forEach(function (c) {
    if (!c.ToaDoSVG) return;
    const tk = thongKeCum(c.MaCum);
    const conKhopLoc = tk.tong === 0 || tk.khopLoc > 0;

    vung.push({
      loai    : 'cum',
      ma      : c.MaCum,
      diem    : c.ToaDoSVG,
      mau     : conKhopLoc ? mauTheoTyLeTrong(tk) : '#cbd5e1',
      mo      : !conKhopLoc,
      nhan    : c.TenCum || c.MaCum,
      nhanPhu : tk.tong > 0 ? (tk.trong + '/' + tk.tong + ' trống') : 'Chưa có dữ liệu',
      tip     : (c.TenCum || c.MaCum) + ' — ' + tk.tong + ' đơn vị, '
                + tk.trong + ' còn trống, ' + tk.khopLoc + ' khớp bộ lọc hiện tại'
                + '  (bấm để xem mặt bằng)'
    });
  });

  // --- (b) Vùng LÔ ĐẤT CÔNG NGHIỆP (MaCum = 'KCN') ---
  (DU_LIEU.nhaXuong || []).forEach(function (nx) {
    if (nx.MaCum !== MA_CUM_KCN || !nx.ToaDoSVG) return;
    const trongLoc = maKhopLoc.indexOf(nx.MaDonVi) > -1;
    vung.push({
      loai    : 'nx',
      ma      : nx.MaDonVi,
      diem    : nx.ToaDoSVG,
      mau     : trongLoc
                  ? (MAU_TRANG_THAI[String(nx.TrangThai).trim()] || MAU_MAC_DINH)
                  : '#cbd5e1',
      mo      : !trongLoc,
      nhan    : nx.TenNhaXuong || nx.MaDonVi,
      tip     : (nx.TenNhaXuong || nx.MaDonVi) + ' — ' + (nx.TrangThai || '?')
                + (nx.DienTichDat ? ' — ' + dinhDangSo(nx.DienTichDat, 'm²') : '')
    });
  });

  capNhatBadgeCanhBao();   // ★ V2.7: cập nhật badge kể cả khi không có vùng nào

  if (vung.length === 0) {
    elAnh.style.display = 'none';
    elSvg.innerHTML = '';
    document.getElementById('ghiChuBanDo').innerHTML =
      '<span class="canh-bao">⚠ Chưa có vùng bấm nào. Dùng <b>Công cụ vẽ vùng</b> '
      + 'để khoanh vùng, rồi dán toạ độ vào cột <b>ToaDoSVG</b>.</span>';
    return;
  }

  dungSVG(ch.ViewBoxMaster, ch.AnhMasterKCN, vung);

  const soCum = vung.filter(function (v) { return v.loai === 'cum'; }).length;
  const soLo  = vung.length - soCum;
  document.getElementById('ghiChuBanDo').innerHTML =
    '💡 Bấm vào <b>cụm xưởng</b> (viền trắng đậm) để xem mặt bằng chi tiết. '
    + 'Bấm vào <b>lô đất công nghiệp</b> để xem thông tin ngay. — Hiện có <b>'
    + soCum + '</b> cụm và <b>' + soLo + '</b> lô đất.';
}

/**
 * Thống kê cụm — bỏ qua nhóm lô đất KCN.
 * `khopLoc` = số đơn vị trong cụm khớp bộ lọc hiện hành (KET_QUA_LOC).
 */
function thongKeCum(maCum) {
  if (maCum === MA_CUM_KCN) return { tong: 0, trong: 0, khopLoc: 0 };
  const ds = (DU_LIEU.nhaXuong || []).filter(function (n) { return n.MaCum === maCum; });
  const maKhopLoc = KET_QUA_LOC.map(function (n) { return n.MaDonVi; });
  return {
    tong   : ds.length,
    trong  : ds.filter(function (n) { return String(n.TrangThai).trim() === 'Trống'; }).length,
    khopLoc: ds.filter(function (n) { return maKhopLoc.indexOf(n.MaDonVi) > -1; }).length
  };
}

function mauTheoTyLeTrong(tk) {
  if (tk.tong === 0)        return MAU_CUM.chuaCoDuLieu;
  if (tk.trong === 0)       return MAU_CUM.daLapDay;
  if (tk.trong === tk.tong) return MAU_CUM.trongHoanToan;
  return MAU_CUM.trongMotPhan;
}


/***********************************************************************
 * CẤP 2 — MẶT BẰNG CỤM
 ***********************************************************************/
function moCum(maCum) {
  const c = (DU_LIEU.cum || []).filter(function (x) { return x.MaCum === maCum; })[0];
  if (!c) return;

  CAP_HIEN_TAI = 'cum';
  CUM_DANG_XEM = maCum;

  document.getElementById('ddPhanCach').classList.remove('an');
  const el = document.getElementById('ddTenCum');
  el.classList.remove('an');
  el.textContent = c.TenCum || maCum;

  veChuGiai();
  veChiTietCum();
}

function veChiTietCum() {
  const maCum = CUM_DANG_XEM;
  const c = (DU_LIEU.cum || []).filter(function (x) { return x.MaCum === maCum; })[0];
  if (!c) return;

  const maKhopLoc = KET_QUA_LOC.map(function (n) { return n.MaDonVi; });

  const ds = (DU_LIEU.nhaXuong || []).filter(function (n) {
    return n.MaCum === maCum && n.ToaDoSVG;
  });

  capNhatBadgeCanhBao();   // ★ V2.7

  if (ds.length === 0) {
    elAnh.src = c.AnhMatBang || '';
    elAnh.style.display = c.AnhMatBang ? 'block' : 'none';
    elSvg.innerHTML = '';
    if (c.ViewBox) elSvg.setAttribute('viewBox', c.ViewBox);
    document.getElementById('ghiChuBanDo').innerHTML =
      '<span class="canh-bao">⚠ Cụm <b>' + maCum + '</b> chưa có vùng bấm. '
      + 'Dùng <b>Công cụ vẽ vùng</b> khoanh từng nhà xưởng, '
      + 'rồi dán vào cột <b>ToaDoSVG</b> của sheet <b>DS_NhaXuong</b>.</span>';
    return;
  }

  const vung = ds.map(function (nx) {
    const trongLoc = maKhopLoc.indexOf(nx.MaDonVi) > -1;
    return {
      loai    : 'nx',
      ma      : nx.MaDonVi,
      diem    : nx.ToaDoSVG,
      mau     : trongLoc
                  ? (MAU_TRANG_THAI[String(nx.TrangThai).trim()] || MAU_MAC_DINH)
                  : '#cbd5e1',
      mo      : !trongLoc,
      nhan    : nx.TenNhaXuong || nx.MaDonVi,
      nhanPhu : nx.KhachThue
                  || (String(nx.TrangThai).trim() === 'Trống' ? 'CÒN TRỐNG' : ''),
      tip     : (nx.TenNhaXuong || nx.MaDonVi) + ' — ' + (nx.TrangThai || '?')
                + (nx.KhachThue ? ' — ' + nx.KhachThue : '')
    };
  });

  dungSVG(c.ViewBox, c.AnhMatBang, vung);

  const tk = thongKeCum(maCum);
  document.getElementById('ghiChuBanDo').innerHTML =
    '💡 Bấm vào <b>nhà xưởng</b> để xem chi tiết. — Cụm này có <b>' + tk.tong
    + '</b> đơn vị, <b style="color:#16a34a">' + tk.trong + '</b> còn trống.';
}


/***********************************************************************
 * HÀM DÙNG CHUNG (gọi từ Script.html)
 ***********************************************************************/
function toMauBanDo() {
  veChuGiai();
  if (CAP_HIEN_TAI === 'cum') veChiTietCum();
  else                        veBanDoTong();
}

function highlightLoDat(ma) {
  const nx = timNhaXuong(ma);
  if (!nx) return;

  if (nx.MaCum === MA_CUM_KCN) {
    if (CAP_HIEN_TAI !== 'tong') veBanDoTong();
  } else if (CUM_DANG_XEM !== nx.MaCum) {
    moCum(nx.MaCum);
  }

  setTimeout(function () {
    boHighlight();
    const p = elSvg.querySelector('[data-ma="' + ma + '"]');
    if (p) {
      p.classList.add('sang');
      p.classList.remove('mo');
      p.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }, 90);
}

function boHighlight() {
  elSvg.querySelectorAll('.vung-bam.sang').forEach(function (p) {
    p.classList.remove('sang');
  });
  document.querySelectorAll('tr.sang').forEach(function (r) {
    r.classList.remove('sang');
  });
}

function veChuGiai() {
  const cg = document.getElementById('chuGiai');
  if (CAP_HIEN_TAI === 'tong') {
    cg.innerHTML =
        '<b class="cg-tieu-de">CỤM XƯỞNG:</b>'
      + '<span><i class="o-mau" style="background:' + MAU_CUM.trongHoanToan + '"></i>Còn trống hoàn toàn</span>'
      + '<span><i class="o-mau" style="background:' + MAU_CUM.trongMotPhan  + '"></i>Còn trống một phần</span>'
      + '<span><i class="o-mau" style="background:' + MAU_CUM.daLapDay      + '"></i>Đã lấp đầy</span>'
      + '<span><i class="o-mau" style="background:' + MAU_CUM.chuaCoDuLieu  + '"></i>Chưa có dữ liệu</span>'
      + '<b class="cg-tieu-de">LÔ ĐẤT:</b>'
      + (DU_LIEU.trangThai || []).map(function (t) {
          return '<span><i class="o-mau" style="background:' + (t.MauSac || MAU_MAC_DINH)
               + '"></i>' + t.TenTrangThai + '</span>';
        }).join('')
      + '<span><i class="o-mau" style="background:#cbd5e1"></i>Ngoài bộ lọc</span>';
  } else {
    cg.innerHTML = (DU_LIEU.trangThai || []).map(function (t) {
      return '<span><i class="o-mau" style="background:' + (t.MauSac || MAU_MAC_DINH)
           + '"></i>' + t.TenTrangThai + '</span>';
    }).join('')
    + '<span><i class="o-mau" style="background:#cbd5e1"></i>Ngoài bộ lọc</span>';
  }
}
</script>
