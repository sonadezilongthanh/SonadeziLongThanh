<script>
/***********************************************************************
 * GIAO DIỆN HỆ THỐNG TRA CỨU KCN LONG THÀNH — PHIÊN BẢN 4.0
 * ★ V4.0 (23/07/2026) — XÁC THỰC THEO TÀI KHOẢN CÁ NHÂN:
 *   • Đăng nhập bằng Email + mật khẩu riêng (không còn mật khẩu dùng chung)
 *   • Bổ sung màn hình Đăng ký tài khoản (chờ quản trị cấp quyền)
 *   • Bổ sung hộp thoại Đổi mật khẩu và màn hình Quản lý tài khoản
 *   • Đã gỡ bỏ toàn bộ cơ chế "Mã khoá chỉnh sửa"
 *   • Quyền sửa: QuanTri và NhapLieu
 * ★ V3.3 — Form chỉnh sửa đọc/ghi đúng cột theo LoaiHinh (giữ nguyên)
 ***********************************************************************/
let DU_LIEU     = { nhaXuong: [], cum: [], trangThai: [] };
let NGUOI_DUNG  = { duocSua: false, laQuanTri: false };
let MAU_TRANG_THAI = {};   // { "Trống": "#22c55e", ... }
let KET_QUA_LOC = [];
let MA_DANG_MO  = null;

const MAU_MAC_DINH = '#94a3b8';

/* ★ V4.0 — Phiên truy cập (không chứa mật khẩu, chỉ chứa token đã ký)
 *   vaiTro: 'QuanTri' | 'NhapLieu' | 'ChiXem' | 'Khach' */
let PHIEN_SUA = { token: '', email: '', hoTen: '', vaiTro: '' };

/* Chống gắn sự kiện / nạp bộ lọc trùng khi tải lại dữ liệu */
let DA_GAN_GIAO_DIEN = false;

/** Quyền sửa hiệu lực — do SERVER xác nhận qua vai trò của tài khoản */
function duocPhepSua() {
  const vt = PHIEN_SUA.vaiTro || NGUOI_DUNG.vaiTro;
  return !!(NGUOI_DUNG.duocSua || vt === 'QuanTri' || vt === 'NhapLieu');
}

/** Có phải tài khoản quản trị không */
function laQuanTri() {
  return (PHIEN_SUA.vaiTro || NGUOI_DUNG.vaiTro) === 'QuanTri';
}


/***********************************************************************
 * TIỆN ÍCH THAO TÁC AN TOÀN VỚI Ô NHẬP
 ***********************************************************************/

/** Lấy phần tử theo id, trả về null nếu không có */
function _o(id) {
  return document.getElementById(id) || null;
}

/** Gán giá trị vào ô nhập nếu ô đó tồn tại */
function _ganO(id, giaTri) {
  const el = _o(id);
  if (el) el.value = (giaTri === null || giaTri === undefined) ? '' : giaTri;
}

/**
 * Thêm 1 trường vào object gửi server — CHỈ KHI ô nhập tồn tại.
 * @param {Object} obj    object dữ liệu sẽ gửi lên server
 * @param {string} tenCot tên cột chính xác trong Sheet DS_NhaXuong
 * @param {string} id     id của ô nhập trên form
 */
function _layO(obj, tenCot, id) {
  const el = _o(id);
  if (!el) return;              // ô chưa có trên form → bỏ qua, không ghi rỗng
  obj[tenCot] = el.value;
}

/** Thoát ký tự đặc biệt khi dựng HTML */
function _escHTML(s) {
  return String(s === null || s === undefined ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}


/***********************************************************************
 * KHỞI ĐỘNG: MÀN HÌNH ĐĂNG NHẬP TRƯỚC, TẢI DỮ LIỆU SAU
 ***********************************************************************/
window.addEventListener('load', function () {
  khoiPhucPhienSua();
  taoManHinhDangNhap();
  taoHopThoaiDoiMK();
  taoHopThoaiQuanLyTK();
  taoMenuTaiKhoan();

  if (PHIEN_SUA.vaiTro) {
    // Đã có phiên trong tab này (kể cả chế độ khách) → vào thẳng
    taiDuLieu();
  } else {
    hienManHinhDangNhap();
  }
});

/** Gọi server tải dữ liệu — server tự lọc thông tin nội bộ nếu là khách */
function taiDuLieu() {
  anManHinhDangNhap();

  const mt = document.getElementById('manHinhTai');
  if (mt) mt.classList.remove('an');
  const ud = document.getElementById('ungDung');
  if (ud) ud.classList.add('an');

  google.script.run
    .withSuccessHandler(khoiTaoApp)
    .withFailureHandler(function (loi) {
      document.getElementById('manHinhTai').innerHTML =
        '<p style="color:#b91c1c">Lỗi tải dữ liệu: ' + loi.message + '</p>';
    })
    .layDuLieuTongHop({ token: PHIEN_SUA.token });
}

function khoiTaoApp(dl) {
  DU_LIEU    = dl;
  NGUOI_DUNG = dl.nguoiDung || { duocSua: false, laQuanTri: false };

  // ★ Đồng bộ vai trò do SERVER xác nhận.
  // Nếu token hết hiệu lực (đổi mật khẩu, bị khoá, bị hạ quyền),
  // server trả về 'Khach' → hạ phiên xuống tương ứng.
  if (NGUOI_DUNG.vaiTro && NGUOI_DUNG.vaiTro !== PHIEN_SUA.vaiTro) {
    PHIEN_SUA.vaiTro = NGUOI_DUNG.vaiTro;
    if (NGUOI_DUNG.vaiTro === 'Khach') {
      PHIEN_SUA.token = '';
      PHIEN_SUA.email = '';
    }
    luuPhienSua();
  }
  if (NGUOI_DUNG.hoTen && NGUOI_DUNG.vaiTro !== 'Khach') {
    PHIEN_SUA.hoTen = NGUOI_DUNG.hoTen;
    PHIEN_SUA.email = NGUOI_DUNG.email || PHIEN_SUA.email;
    luuPhienSua();
  }

  // Bảng màu trạng thái (xây lại từ đầu để tải lại không bị trùng)
  MAU_TRANG_THAI = {};
  (DU_LIEU.trangThai || []).forEach(function (t) {
    MAU_TRANG_THAI[String(t.TenTrangThai).trim()] = t.MauSac || MAU_MAC_DINH;
  });

  capNhatChipVaiTro();

  // Chỉ nạp bộ lọc + gắn sự kiện 1 lần duy nhất
  if (!DA_GAN_GIAO_DIEN) {
    napBoLoc();
    ganSuKien();
    DA_GAN_GIAO_DIEN = true;
  }
  apDungBoLoc();

  document.getElementById('manHinhTai').classList.add('an');
  document.getElementById('ungDung').classList.remove('an');
}

/** Cập nhật tên + chip vai trò trên header (nhấn chip để mở menu tài khoản) */
function capNhatChipVaiTro() {
  const elTen = document.getElementById('tenNguoiDung');
  if (elTen) {
    elTen.textContent = PHIEN_SUA.hoTen || NGUOI_DUNG.hoTen || 'Khách';
  }

  let nhan;
  switch (PHIEN_SUA.vaiTro || NGUOI_DUNG.vaiTro) {
    case 'QuanTri':  nhan = '🔑 Quản trị';    break;
    case 'NhapLieu': nhan = '✏️ Nhập liệu';   break;
    case 'ChiXem':   nhan = '👁 Xem nội bộ';  break;
    default:         nhan = 'Chế độ khách';
  }

  const el = document.getElementById('nhanVaiTro');
  if (el) {
    el.textContent = nhan + ' ▾';
    el.title = 'Nhấn để mở menu tài khoản';
    el.style.cursor = 'pointer';
    el.onclick = function (ev) { moMenuTaiKhoan(ev); };
  }
}


/***********************************************************************
 * ★ V4.0 — MENU TÀI KHOẢN (bấm vào chip vai trò trên header)
 ***********************************************************************/
function taoMenuTaiKhoan() {
  if (document.getElementById('menuTaiKhoan')) return;

  document.body.insertAdjacentHTML('beforeend',
      '<style>'
    + '#menuTaiKhoan{position:fixed;z-index:10050;background:#fff;'
    +   'border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,.22);'
    +   'min-width:230px;overflow:hidden;border:1px solid #e4e8ef}'
    + '#menuTaiKhoan.an{display:none}'
    + '.mtk-dau{padding:12px 15px;background:#f6f8fc;border-bottom:1px solid #e4e8ef}'
    + '.mtk-ten{font-weight:700;color:#0B4696;font-size:14px}'
    + '.mtk-mail{font-size:11.5px;color:#7c879a;word-break:break-all;margin-top:2px}'
    + '.mtk-muc{display:block;width:100%;text-align:left;padding:11px 15px;'
    +   'border:none;background:#fff;font-size:13.5px;color:#243;cursor:pointer}'
    + '.mtk-muc:hover{background:#eef3fb}'
    + '.mtk-muc.thoat{color:#b91c1c;border-top:1px solid #eef0f4}'
    + '#lopPhuMenuTK{position:fixed;inset:0;z-index:10040}'
    + '#lopPhuMenuTK.an{display:none}'
    + '</style>'
    + '<div id="lopPhuMenuTK" class="an" onclick="dongMenuTaiKhoan()"></div>'
    + '<div id="menuTaiKhoan" class="an">'
    +   '<div class="mtk-dau">'
    +     '<div class="mtk-ten" id="mtkTen">—</div>'
    +     '<div class="mtk-mail" id="mtkMail"></div>'
    +   '</div>'
    +   '<div id="mtkDanhSachMuc"></div>'
    + '</div>');
}

function moMenuTaiKhoan(ev) {
  taoMenuTaiKhoan();
  const menu = document.getElementById('menuTaiKhoan');
  const lop  = document.getElementById('lopPhuMenuTK');

  const laKhach = !PHIEN_SUA.token;

  document.getElementById('mtkTen').textContent =
    laKhach ? 'Chế độ khách' : (PHIEN_SUA.hoTen || 'Người dùng');
  document.getElementById('mtkMail').textContent =
    laKhach ? 'Chưa đăng nhập' : (PHIEN_SUA.email || '');

  let html = '';
  if (laKhach) {
    html += '<button class="mtk-muc" onclick="dongMenuTaiKhoan();dangXuat(true)">'
          + '🔐 Đăng nhập tài khoản</button>';
  } else {
    html += '<button class="mtk-muc" onclick="dongMenuTaiKhoan();moDoiMatKhau()">'
          + '🔑 Đổi mật khẩu</button>';
    if (laQuanTri()) {
      html += '<button class="mtk-muc" onclick="dongMenuTaiKhoan();moQuanLyTaiKhoan()">'
            + '👥 Quản lý tài khoản</button>';
    }
    html += '<button class="mtk-muc thoat" onclick="dongMenuTaiKhoan();dangXuat()">'
          + '🚪 Đăng xuất</button>';
  }
  document.getElementById('mtkDanhSachMuc').innerHTML = html;

  lop.classList.remove('an');
  menu.classList.remove('an');

  // Định vị menu ngay dưới chip vai trò
  const chip = document.getElementById('nhanVaiTro');
  if (chip) {
    const r = chip.getBoundingClientRect();
    const rong = menu.offsetWidth || 230;
    let trai = r.right - rong;
    if (trai < 8) trai = 8;
    if (trai + rong > window.innerWidth - 8) trai = window.innerWidth - rong - 8;
    menu.style.left = trai + 'px';
    menu.style.top  = (r.bottom + 8) + 'px';
  }
  if (ev) ev.stopPropagation();
}

function dongMenuTaiKhoan() {
  const m = document.getElementById('menuTaiKhoan');
  const l = document.getElementById('lopPhuMenuTK');
  if (m) m.classList.add('an');
  if (l) l.classList.add('an');
}

    +   'font-weight:600;cursor:pointer;padding:4px;text-decoration:underline}'

    + '</style>'
    + '<div id="manHinhDangNhap" class="an">'
    +   '<div class="dn-hop">'
    +     '<img class="dn-logo" alt="Sonadezi Long Thành" '
    +       'src="https://drive.google.com/thumbnail?id=1LY4a06X3731WVwceDNHNlPmDZXIRTi9d&sz=w120">'
    +     '<h2>KCN LONG THÀNH</h2>'
    +     '<p class="dn-mota">Hệ thống tra cứu nhà xưởng &amp; đất cho thuê</p>'

    /* ---------- KHUNG 1: ĐĂNG NHẬP ---------- */
    +     '<div class="dn-khung" id="dnKhungDangNhap">'
    +       '<label class="dn-nhan" for="dnEmail">Email tài khoản</label>'
    +       '<input type="email" id="dnEmail" class="dn-o" '
    +         'placeholder="vd: nguyenvana@gmail.com" autocomplete="username" '
    +         'onkeydown="if(event.key===\'Enter\') document.getElementById(\'dnMatKhau\').focus()">'
    +       '<label class="dn-nhan" for="dnMatKhau">Mật khẩu</label>'
    +       '<input type="password" id="dnMatKhau" class="dn-o" '
    +         'placeholder="Nhập mật khẩu cá nhân" autocomplete="current-password" '
    +         'onkeydown="if(event.key===\'Enter\') guiDangNhap()">'
    +       '<div id="dnThongBao"></div>'
    +       '<button class="dn-nut-chinh" id="dnNutDangNhap" onclick="guiDangNhap()">Đăng nhập</button>'
    +       '<p style="margin:12px 0 0;font-size:13px;color:#66738a">Chưa có tài khoản? '
    +         '<button class="dn-lienket" onclick="chuyenSangDangKy()">Đăng ký tại đây</button></p>'
    +       '<div class="dn-hoac"><span>hoặc</span></div>'
    +       '<button class="dn-nut-khach" onclick="vaoCheDoKhach()">👁 Xem ở chế độ khách</button>'
    +       '<p class="dn-ghichu">Chế độ khách: tra cứu, xem bản đồ, dẫn đường và '

    /* ---------- KHUNG 2: ĐĂNG KÝ ---------- */

    +         'placeholder="vd: Nguyễn Văn A" autocomplete="name">'

function chuyenSangDangKy() {
  document.getElementById('dnKhungDangNhap').classList.add('an');
  document.getElementById('dnKhungDangKy').classList.remove('an');
  const tb = document.getElementById('dkThongBao');
  tb.className = ''; tb.textContent = '';
  setTimeout(function () {
    const o = document.getElementById('dkHoTen');
    if (o) o.focus();
  }, 80);
}

function chuyenSangDangNhap() {
  document.getElementById('dnKhungDangKy').classList.add('an');
  document.getElementById('dnKhungDangNhap').classList.remove('an');
  setTimeout(function () {
    const o = document.getElementById('dnEmail');
    if (o) o.focus();
  }, 80);
}

function hienManHinhDangNhap() {
  const mt = document.getElementById('manHinhTai');
  if (mt) mt.classList.add('an');

  const tb = document.getElementById('dnThongBao');
  if (tb) { tb.className = ''; tb.textContent = ''; }
  const mk = document.getElementById('dnMatKhau');
  if (mk) mk.value = '';

  chuyenSangDangNhap();
  document.getElementById('manHinhDangNhap').classList.remove('an');

  // Gợi ý lại email đã dùng lần trước (desktop giữ được localStorage)
  try {
    const emailCu = localStorage.getItem('SZL_EMAIL_DANG_NHAP') || '';
    const oEmail = document.getElementById('dnEmail');
    if (emailCu && oEmail && !oEmail.value) oEmail.value = emailCu;
  } catch (e) {}

  setTimeout(function () {
    const oEmail = document.getElementById('dnEmail');
    const oMK    = document.getElementById('dnMatKhau');
    if (oEmail && oEmail.value && oMK) oMK.focus();
    else if (oEmail) oEmail.focus();
  }, 120);
}

function anManHinhDangNhap() {
  const el = document.getElementById('manHinhDangNhap');
  if (el) el.classList.add('an');
}

/** Gửi yêu cầu đăng nhập lên server */
function guiDangNhap() {
  const email = document.getElementById('dnEmail').value.trim();
  const mk    = document.getElementById('dnMatKhau').value;
  const tb    = document.getElementById('dnThongBao');
  const nut   = document.getElementById('dnNutDangNhap');

  tb.className = '';
  if (!email) { tb.textContent = '✕ Vui lòng nhập email tài khoản.'; return; }
  if (!mk)    { tb.textContent = '✕ Vui lòng nhập mật khẩu.'; return; }

  nut.disabled = true;
  nut.textContent = 'Đang kiểm tra…';
  tb.textContent = '';

  google.script.run
    .withSuccessHandler(function (kq) {
      nut.disabled = false;
      nut.textContent = 'Đăng nhập';

      try { localStorage.setItem('SZL_EMAIL_DANG_NHAP', kq.email); } catch (e) {}

      PHIEN_SUA = {
        token : kq.token,
        email : kq.email,
        hoTen : kq.hoTen,
        vaiTro: kq.vaiTro
      };
      luuPhienSua();

      // Tài khoản vừa được quản trị đặt lại mật khẩu → buộc đổi ngay
      if (kq.buocDoiMatKhau) {
        taiDuLieu();
        setTimeout(function () {
          alert('Tài khoản của bạn đang dùng mật khẩu tạm do quản trị cấp.\n'
              + 'Vui lòng đổi mật khẩu ngay.');
          moDoiMatKhau(true);
        }, 900);
        return;
      }
      taiDuLieu();
    })
    .withFailureHandler(function (loi) {
      nut.disabled = false;
      nut.textContent = 'Đăng nhập';
      tb.className = '';
      tb.textContent = '✕ ' + loi.message;
    })
    .dangNhapTaiKhoan(email, mk);
}

/** Gửi yêu cầu đăng ký tài khoản mới */
function guiDangKy() {
  const hoTen = document.getElementById('dkHoTen').value.trim();
  const email = document.getElementById('dkEmail').value.trim();
  const mk    = document.getElementById('dkMatKhau').value;
  const mk2   = document.getElementById('dkMatKhau2').value;
  const tb    = document.getElementById('dkThongBao');
  const nut   = document.getElementById('dkNutDangKy');

  tb.className = '';
  if (hoTen.length < 3) { tb.textContent = '✕ Vui lòng nhập họ tên (tối thiểu 3 ký tự).'; return; }
  if (!email)           { tb.textContent = '✕ Vui lòng nhập email.'; return; }
  if (mk.length < 6)    { tb.textContent = '✕ Mật khẩu phải có tối thiểu 6 ký tự.'; return; }
  if (mk !== mk2)       { tb.textContent = '✕ Hai lần nhập mật khẩu chưa khớp nhau.'; return; }

  nut.disabled = true;
  nut.textContent = 'Đang gửi…';
  tb.textContent = '';

  google.script.run
    .withSuccessHandler(function (kq) {
      nut.disabled = false;
      nut.textContent = 'Gửi yêu cầu đăng ký';
      tb.className = 'ok';
      tb.textContent = '✓ ' + (kq && kq.thongBao ? kq.thongBao : 'Đã gửi yêu cầu đăng ký.');

      document.getElementById('dkMatKhau').value  = '';
      document.getElementById('dkMatKhau2').value = '';

      // Chuyển sẵn email sang màn hình đăng nhập cho tiện
      const oEmail = document.getElementById('dnEmail');
      if (oEmail) oEmail.value = email;
    })
    .withFailureHandler(function (loi) {
      nut.disabled = false;
      nut.textContent = 'Gửi yêu cầu đăng ký';
      tb.className = '';
      tb.textContent = '✕ ' + loi.message;
    })
    .dangKyTaiKhoan(email, hoTen, mk);
}

/** Vào ứng dụng ở chế độ khách — server sẽ lọc bỏ thông tin nội bộ */

  PHIEN_SUA = { token: '', email: '', hoTen: 'Khách', vaiTro: 'Khach' };

 ***********************************************************************/

/** Khôi phục phiên trong cùng tab trình duyệt (nếu có) */
function khoiPhucPhienSua() {
  try {
    const s = sessionStorage.getItem('SZL_PHIEN_SUA');
    if (s) {
      PHIEN_SUA = JSON.parse(s);
      PHIEN_SUA.token  = PHIEN_SUA.token  || '';
      PHIEN_SUA.email  = PHIEN_SUA.email  || '';
      PHIEN_SUA.hoTen  = PHIEN_SUA.hoTen  || '';
      PHIEN_SUA.vaiTro = PHIEN_SUA.vaiTro || '';
      // Phiên cũ V3.x không có email nhưng có token → buộc đăng nhập lại
      if (PHIEN_SUA.token && !PHIEN_SUA.email) {
        PHIEN_SUA = { token: '', email: '', hoTen: '', vaiTro: '' };
      }
    }
  } catch (e) { /* trình duyệt chặn sessionStorage — bỏ qua */ }
}

function luuPhienSua() {
  try {
    sessionStorage.setItem('SZL_PHIEN_SUA', JSON.stringify(PHIEN_SUA));
  } catch (e) { /* bỏ qua */ }
}

  taoHopThoaiDoiMK();
  ['dmkCu', 'dmkMoi', 'dmkMoi2'].forEach(function (id) {

function dongDoiMatKhau() {
  const el = document.getElementById('hopThoaiDoiMK');

}

function guiDoiMatKhau() {
  const cu   = document.getElementById('dmkCu').value;
  const moi  = document.getElementById('dmkMoi').value;
  const moi2 = document.getElementById('dmkMoi2').value;
  const tb   = document.getElementById('dmkThongBao');
  const nut  = document.getElementById('dmkNut');

  tb.className = 'tk-tb';
  if (!cu)             { tb.textContent = '✕ Vui lòng nhập mật khẩu hiện tại.'; return; }
  if (moi.length < 6)  { tb.textContent = '✕ Mật khẩu mới phải có tối thiểu 6 ký tự.'; return; }
  if (moi !== moi2)    { tb.textContent = '✕ Hai lần nhập mật khẩu mới chưa khớp.'; return; }
  if (moi === cu)      { tb.textContent = '✕ Mật khẩu mới phải khác mật khẩu hiện tại.'; return; }

  nut.disabled = true;
  nut.textContent = 'Đang cập nhật…';
  tb.textContent = '';

  google.script.run
    .withSuccessHandler(function (kq) {
      nut.disabled = false;
      nut.textContent = 'Cập nhật mật khẩu';

function veBangTaiKhoan(ds) {
  const than = document.getElementById('qltkThan');
  if (!ds || ds.length === 0) {
    than.innerHTML = '<tr><td style="padding:20px;text-align:center;color:#8b96a8">'
                   + 'Chưa có tài khoản nào.</td></tr>';
    return;
  }

  const VAI_TRO   = ['QuanTri', 'NhapLieu', 'ChiXem'];
  const TRANG_THAI = ['ChoDuyet', 'HoatDong', 'Khoa'];

  let html = '<tr><th>Họ tên / Email</th><th>Vai trò</th><th>Trạng thái</th>'
           + '<th>Đăng ký</th><th>Đăng nhập cuối</th><th>Thao tác</th></tr>';

  ds.forEach(function (tk, i) {
    const choDuyet = (tk.trangThai === 'ChoDuyet');
    const eMail = _escHTML(tk.email);

    let optVT = '';
    VAI_TRO.forEach(function (v) {
      optVT += '<option value="' + v + '"'
             + (tk.vaiTro === v ? ' selected' : '') + '>' + v + '</option>';
    });
    if (VAI_TRO.indexOf(tk.vaiTro) < 0) {
      optVT = '<option value="" selected>— chưa cấp —</option>' + optVT;
    }

    let optTT = '';
    TRANG_THAI.forEach(function (v) {
      optTT += '<option value="' + v + '"'
             + (tk.trangThai === v ? ' selected' : '') + '>' + v + '</option>';
    });

    html += '<tr' + (choDuyet ? ' class="cho-duyet"' : '') + '>'
          + '<td><div class="qltk-mail">' + _escHTML(tk.hoTen || '(chưa có tên)') + '</div>'
          +     '<div class="qltk-phu">' + eMail + '</div></td>'
          + '<td><select class="qltk-o" id="qltkVT' + i + '">' + optVT + '</select></td>'
          + '<td><select class="qltk-o" id="qltkTT' + i + '">' + optTT + '</select></td>'
          + '<td class="qltk-phu">' + _escHTML(tk.ngayDangKy || '—') + '</td>'
          + '<td class="qltk-phu">' + _escHTML(tk.dangNhapCuoi || '—') + '</td>'
          + '<td style="white-space:nowrap">'
          +   '<button class="qltk-nut qltk-luu" onclick="luuTaiKhoanDong(' + i + ',\''
          +     eMail + '\')">Lưu</button>'
          +   '<button class="qltk-nut qltk-reset" onclick="datLaiMKTaiKhoan(\''
          +     eMail + '\')">Đặt lại MK</button>'
          +   '<button class="qltk-nut qltk-xoa" onclick="xoaTaiKhoanDong(\''
          +     eMail + '\')">Xoá</button>'
          + '</td></tr>';
  });

  than.innerHTML = html;
}

  baoQuanLyTK('Đang lưu…');

    .withSuccessHandler(function () {

/** Đổi MaCum -> TenCum để hiển thị trong danh sách chọn */
function _tenCum(maCum) {
  const c = (DU_LIEU.cum || []).filter(function (x) { return x.MaCum === maCum; })[0];
  return (c && c.TenCum) || maCum;
}

/** Diện tích đại diện dùng cho bộ lọc khoảng m² */
function soM2(nx) {
  const raw = nx.DienTichXuong_m2 || nx['Tong DienTichDatThue (m2)'] || '';
  const n = parseFloat(String(raw).replace(/,/g, ''));
  return isNaN(n) ? null : n;
}

/** ★ Khai báo tập trung 5 ô lọc dạng danh sách chọn. */
const O_LOC_CHON = [
  { id: 'locCum',         nhanTatCa: '— Tất cả khu vực / cụm —',
    lay : function (nx) { return String(nx.MaCum || '').trim(); },
    hien: _tenCum },

  { id: 'locTrangThai',   nhanTatCa: '— Tất cả trạng thái —',
    lay : function (nx) { return String(nx.TrangThai || '').trim(); } },

  { id: 'locLoaiHinh',    nhanTatCa: '— Tất cả loại hình —',
    lay : function (nx) { return String(nx.LoaiHinh || '').trim(); } },

  { id: 'locQuocTich',    nhanTatCa: '— Tất cả quốc tịch —',
    lay : function (nx) { return String(nx.QuocTich || '').trim(); } },

  { id: 'locThoiHanThue', nhanTatCa: '— Tất cả thời hạn thuê —',
    lay : function (nx) {
            return String(nx.ThoiHanThue || nx.ThoiHanThue_ChiTiet || '').trim();
          } }
];

/* Không còn nạp tĩnh danh mục nữa — mọi danh sách đều dựng động theo
   dữ liệu đang khớp. Giữ lại hàm rỗng để khoiTaoApp() không phải sửa. */
function napBoLoc() { /* cố ý để trống */ }


/* ---------- Đọc toàn bộ giá trị đang nhập trên thanh lọc ---------- */
function docBoLoc() {
  function val(id) {
    const el = document.getElementById(id);
    return el ? el.value : '';
  }
  const chon = {};
  O_LOC_CHON.forEach(function (c) { chon[c.id] = val(c.id); });

  return {
    tuKhoa   : val('oTimKiem').trim().toLowerCase(),
    nganhNghe: val('locNganhNghe').trim().toLowerCase(),
    dtMin    : parseFloat(val('locDTMin')),
    dtMax    : parseFloat(val('locDTMax')),
    chon     : chon
  };
}


/* ---------- Vị từ lọc dùng chung ---------- */
function khopBoLoc(nx, L, boQuaId) {

  // 1. Từ khoá chung
  if (L.tuKhoa) {
    const chuoi = [nx.MaDonVi, nx.TenNhaXuong, nx.KhachThue, nx.GhiChu]
                    .join(' ').toLowerCase();
    if (chuoi.indexOf(L.tuKhoa) < 0) return false;
  }

  // 2. Ngành nghề / sản phẩm (tìm gần đúng)
  if (L.nganhNghe) {
    const nn = ((nx.NganhNghe_SanPham || '') + ' ' + (nx.NganhNghe || '')).toLowerCase();
    if (nn.indexOf(L.nganhNghe) < 0) return false;
  }

  // 3. Khoảng diện tích
  if (!isNaN(L.dtMin) || !isNaN(L.dtMax)) {
    const dt = soM2(nx);
    if (dt === null) return false;
    if (!isNaN(L.dtMin) && dt < L.dtMin) return false;
    if (!isNaN(L.dtMax) && dt > L.dtMax) return false;
  }

  // 4. Các ô danh sách chọn
  for (let i = 0; i < O_LOC_CHON.length; i++) {
    const c = O_LOC_CHON[i];
    if (c.id === boQuaId) continue;
    const v = L.chon[c.id];
    if (v && c.lay(nx) !== v) return false;
  }

  return true;
}


/* ---------- Dựng lại TẤT CẢ danh sách chọn theo thời gian thực ---------- */
function capNhatOChon(L) {
  O_LOC_CHON.forEach(function (c) {
    const sel = document.getElementById(c.id);
    if (!sel) return;

    const dangChon = L.chon[c.id] || '';
    const dem = {};

    (DU_LIEU.nhaXuong || []).forEach(function (nx) {
      if (!khopBoLoc(nx, L, c.id)) return;
      const v = c.lay(nx);
      if (v) dem[v] = (dem[v] || 0) + 1;
    });

    const ds = Object.keys(dem).sort(function (a, b) {
      return a.localeCompare(b, 'vi');
    });

    let html = '<option value="">' + c.nhanTatCa + '</option>';
    ds.forEach(function (v) {
      const ten = c.hien ? c.hien(v) : v;
      html += '<option value="' + _escHTML(v) + '">'
            + _escHTML(ten) + ' (' + dem[v] + ')</option>';
    });

    // Giữ lại lựa chọn hiện hành dù không còn kết quả
    if (dangChon && ds.indexOf(dangChon) < 0) {
      const ten = c.hien ? c.hien(dangChon) : dangChon;
      html += '<option value="' + _escHTML(dangChon) + '">'
            + _escHTML(ten) + ' (0 kết quả)</option>';
    }

    sel.innerHTML = html;
    sel.value = dangChon;   // gán .value không kích hoạt sự kiện change
  });
}


/* ---------- Gán sự kiện ---------- */
let _henLoc = null;

/** Ô nhập chữ/số: chờ 180ms cho khỏi giật khi gõ nhanh */
function _locTreHoan() {
  clearTimeout(_henLoc);
  _henLoc = setTimeout(apDungBoLoc, 180);
}

function ganSuKien() {
  // Ô nhập tự do
  ['oTimKiem', 'locNganhNghe', 'locDTMin', 'locDTMax'].forEach(function (id) {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', _locTreHoan);
  });

  // Ô danh sách chọn — dùng 'change' (ổn định trên Safari/iPad)
  O_LOC_CHON.forEach(function (c) {
    const el = document.getElementById(c.id);
    if (el) el.addEventListener('change', apDungBoLoc);
  });

  document.getElementById('nutXoaLoc').onclick = function () {
    ['oTimKiem', 'locNganhNghe', 'locDTMin', 'locDTMax'].forEach(function (id) {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
    O_LOC_CHON.forEach(function (c) {
      const el = document.getElementById(c.id);
      if (el) el.value = '';
    });
    apDungBoLoc();
  };

  document.getElementById('nutXuatExcel').onclick = xuatExcel;

  document.querySelectorAll('.tab').forEach(function (b) {
    b.onclick = function () { chuyenTab(b.dataset.tab); };
  });
}


/** ★ Bộ lọc tác động đồng thời lên CẢ 2 TAB */
function apDungBoLoc() {
  const L = docBoLoc();

  // 1. Cập nhật lại toàn bộ danh sách chọn (real-time, exclude-self)
  capNhatOChon(L);

  // 2. Kết quả cuối cùng — áp đủ mọi điều kiện
  KET_QUA_LOC = (DU_LIEU.nhaXuong || []).filter(function (nx) {
    return khopBoLoc(nx, L, null);
  });

  document.getElementById('soKetQua').textContent = KET_QUA_LOC.length + ' kết quả';

  renderTieuDeBang(L.chon.locLoaiHinh);   // Tiêu đề cột động theo Loại hình
  renderBangTraCuu(KET_QUA_LOC);          // Tab 1 — Tra cứu
  toMauBanDo(KET_QUA_LOC);                // Tab 2 — Bản đồ
}

function xuatExcel() {
  if (!KET_QUA_LOC || KET_QUA_LOC.length === 0) {
    alert('Không có dữ liệu để xuất. Vui lòng lọc trước khi xuất.');
    return;
  }
  /* File Excel LUÔN xuất đủ cột của loại hình đang lọc,
     không phụ thuộc các nhóm cột đang bật/tắt trên màn hình. */
  const cotDinhDanh = [
    ['Mã',            function (nx) { return nx.MaDonVi || ''; }],
    ['Tên nhà xưởng', function (nx) { return nx.TenNhaXuong || ''; }],
    ['Khu vực',       function (nx) { return nx.MaCum || ''; }],
    ['Loại hình',     function (nx) { return nx.LoaiHinh || ''; }],
    ['Trạng thái',    function (nx) { return nx.TrangThai || ''; }]
  ];

  const cot    = cotDinhDanh.concat(COT_RIENG_DAY_DU || COT_RIENG_DANG_HIEN);
  const tieuDe = cot.map(function (c) { return c[0]; });
  const duLieu = KET_QUA_LOC.map(function (nx) {
    return cot.map(function (c) { return String(c[1](nx) || ''); });
  });

  const nut = document.getElementById('nutXuatExcel');
  const chuGoc = nut.textContent;
  nut.disabled = true;
  nut.textContent = '⏳ Đang tạo file…';
  const cuaSo = window.open('', '_blank');

  google.script.run
    .withSuccessHandler(function (url) {
      nut.disabled = false; nut.textContent = chuGoc;
      if (cuaSo) cuaSo.location = url; else window.open(url, '_blank');
    })
    .withFailureHandler(function (loi) {
      nut.disabled = false; nut.textContent = chuGoc;
      if (cuaSo) cuaSo.close();
      alert('Lỗi khi xuất Excel: ' + loi.message);
    })
    .xuatExcelTraCuu(tieuDe, duLieu);
}

/***********************************************************************
 * HAI HÀM ĐỌC "CHỊU LỖI" CHO 2 TRƯỜNG HAY BỊ LỆCH CỘT
 *  Sheet có 2 cột khác tên cho cùng một nội dung:
 *    Ngành nghề   : NganhNghe_SanPham (Nhà xưởng) | NganhNghe (Đất)
 *    Thời hạn thuê: ThoiHanThue       (Nhà xưởng) | ThoiHanThue_ChiTiet (Đất)

function docNganhNghe(nx) {
  if (!nx) return '';
  return (String(nx.LoaiHinh || '').trim() === 'Đất cho thuê')
    ? (nx.NganhNghe || nx.NganhNghe_SanPham || '')
    : (nx.NganhNghe_SanPham || nx.NganhNghe || '');
}

function docThoiHanThue(nx) {
  if (!nx) return '';
  return (String(nx.LoaiHinh || '').trim() === 'Đất cho thuê')
    ? (nx.ThoiHanThue_ChiTiet || nx.ThoiHanThue || '')
    : (nx.ThoiHanThue || nx.ThoiHanThue_ChiTiet || '');
}

/**
 * Giá chào thuê tổng hợp, tính từ các cột đơn giá chi tiết.
 */
function giaChaoThue_(nx) {
  if (!nx) return '';
  const laDat = String(nx.LoaiHinh || '').trim() === 'Đất cho thuê';

  if (!laDat) {
    return nx['TienThueXuong - DonGia (USD)']
      ? nx['TienThueXuong - DonGia (USD)'] + ' USD/m²/tháng'
      : '';
  }

  const phan = [];
  if (nx['TienThueMatBang - DonGia (USD)']) {
    phan.push('Mặt bằng: ' + nx['TienThueMatBang - DonGia (USD)'] + ' USD/m²/năm');
  }
  if (nx['TienDatTho - DonGia (USD)']) {
    phan.push('Đất thô: ' + nx['TienDatTho - DonGia (USD)'] + ' USD/m²/năm');
  }
  return phan.join(' — ');
}

function dongTT(nhan, giaTri) {
  if (giaTri === '' || giaTri === null || giaTri === undefined) return '';
  return '<div class="dong-tt"><span class="nhan-tt">' + nhan + '</span>'
       + '<span class="gia-tri">' + giaTri + '</span></div>';
}

function dinhDangSo(v, donVi) {
  if (!v && v !== 0) return '';
  const n = parseFloat(v);
  if (isNaN(n)) return v;
  return n.toLocaleString('vi-VN') + ' ' + (donVi || '');
}

/** Gộp Đơn giá + PT thanh toán thành 1 dòng hiển thị */
function ghepGiaPT(donGia, pt, donVi) {
  donGia = (donGia === null || donGia === undefined) ? '' : String(donGia).trim();
  pt     = (pt     === null || pt     === undefined) ? '' : String(pt).trim();
  if (donGia && donVi) donGia = donGia + ' ' + donVi;
  if (donGia && pt)  return donGia + ' — ' + pt;
  if (donGia)        return donGia;
  if (pt)            return pt;
  return '';
}

  nut.disabled = true;
  nut.textContent = 'Đang lưu…';
  tb.className = 'thong-bao';

  google.script.run

      nut.disabled = false;
      nut.textContent = '💾 Lưu';

      // Cảnh báo nếu có tên cột không khớp tiêu đề Sheet
      const thieu = (kq && kq.cotKhongTonTai) || [];
      if (thieu.length > 0) {
        tb.className = 'thong-bao loi';
        tb.textContent = '⚠ Đã lưu, nhưng KHÔNG tìm thấy cột: '
          + thieu.join(', ')
          + '. Vui lòng báo quản trị kiểm tra tiêu đề sheet DS_NhaXuong.';
        return;   // giữ hộp thoại mở để người dùng đọc cảnh báo
      }

      tb.className = 'thong-bao ok';
      tb.textContent = '✓ Đã lưu thành công ('
        + ((kq && kq.soTruongDaSua) || 0) + ' ô thay đổi).';
      setTimeout(function () {
        dongHopThoaiSua();
        moPanelChiTiet(ma);
      }, 700);
    })
    .withFailureHandler(function (e) {
      nut.disabled = false;
      nut.textContent = '💾 Lưu';
      tb.className = 'thong-bao loi';
      tb.textContent = '✕ Lỗi: ' + e.message;
    })
    .capNhatNhaXuong(ma, duLieuMoi, { token: PHIEN_SUA.token });
}

let BC_DON_VI = null;

const MAU_TIN_MAC_DINH =
  'Kính gửi Quý khách,\n\n'
+ 'Công ty CP Sonadezi Long Thành trân trọng giới thiệu:\n\n'
+ '🏭 {TenNhaXuong}\n'
+ '📍 Khu vực: {TenCum}\n'
+ '📐 Diện tích đất: {DienTichDat}\n'
+ '🏗️ Diện tích xây dựng: {DienTichXayDung}\n'

+ '✅ Tình trạng: {TrangThai}\n\n'
+ '📎 Tài liệu đính kèm:\n{DanhSachLink}\n\n'
+ '{LinkDinhVi}'
+ 'Rất mong được đón tiếp Quý khách tham quan thực tế.\n\n'
+ 'Trân trọng,\n{NguoiLienHe}\n{SoDienThoai}\n{Email}';

function moBrochure(ma) {
  const nx = timNhaXuong(ma);
  if (!nx) return;
  BC_DON_VI = nx;

  document.getElementById('bcTenDonVi').textContent = nx.TenNhaXuong || ma;
  document.getElementById('bcThongBao').textContent = '';
  document.getElementById('bcKhungQR').classList.add('an');

  const ds = layDanhSachTaiLieu(nx);

  if (ds.length === 0) {
    document.getElementById('bcDanhSach').innerHTML =
      '<div class="canh-bao">⚠ Đơn vị này chưa có tài liệu nào. '
      + 'Bổ sung tại sheet <b>DS_TaiLieu</b> hoặc cột <b>LinkBrochure</b>.</div>';
  } else {
    document.getElementById('bcDanhSach').innerHTML = ds.map(function (t, i) {
      return '<label class="bc-muc">'
           + '<input type="checkbox" class="bc-chon" data-i="' + i + '" checked '
           +   'onchange="soanTinNhan()">'
           + '<span class="bc-ten">📄 ' + t.ten + '</span>'
           + (t.loai ? '<span class="bc-loai">' + t.loai + '</span>' : '')
           + '<a href="' + t.link + '" target="_blank" rel="noopener" class="bc-xem">Xem ↗</a>'
           + '</label>';
    }).join('');
  }

  soanTinNhan();
  document.getElementById('hopThoaiBrochure').classList.remove('an');

/** Gom tài liệu từ DS_TaiLieu + LinkBrochure + brochure chung của KCN */
function layDanhSachTaiLieu(nx) {
  const ds = [];

  (nx.DanhSachTaiLieu || []).forEach(function (t) {
    if (t.link) ds.push({ ten: t.ten || 'Tài liệu', link: t.link, loai: t.loai || '' });
  });

  if (nx.LinkBrochure) {
    ds.push({ ten: 'Brochure ' + (nx.TenNhaXuong || nx.MaDonVi),
              link: nx.LinkBrochure, loai: 'Brochure' });
  }
  if (nx.LinkAnh) {
    ds.push({ ten: 'Hình ảnh thực tế', link: nx.LinkAnh, loai: 'Hình ảnh' });
  }

  const ch = DU_LIEU.cauHinh || {};
  if (ch.BrochureChungKCN) {
    ds.push({ ten: 'Brochure tổng quan KCN Long Thành',
              link: ch.BrochureChungKCN, loai: 'Tổng quan' });
  }
  return ds;
}

/** Sinh nội dung tin nhắn từ mẫu trong DM_CauHinh */
function soanTinNhan() {
  if (!BC_DON_VI) return;
  const nx = BC_DON_VI;
  const ch = DU_LIEU.cauHinh || {};

  const ds = layDanhSachTaiLieu(nx);
  const chon = [];
  document.querySelectorAll('.bc-chon').forEach(function (cb) {
    if (cb.checked) chon.push(ds[parseInt(cb.dataset.i, 10)]);
  });

  const dsLink = chon.length
    ? chon.map(function (t) { return '• ' + t.ten + ':\n' + t.link; }).join('\n')
    : '(chưa chọn tài liệu)';

  let linkDinhVi = '';
  if (nx.Lat && nx.Lng) {
    linkDinhVi = '📍 Xem vị trí trên bản đồ:\n'
               + 'https://www.google.com/maps/search/?api=1&query='
               + nx.Lat + ',' + nx.Lng + '\n\n';
  }

  const cum = (DU_LIEU.cum || []).filter(function (c) {
    return c.MaCum === nx.MaCum;
  })[0];

  // Tính giá chào thuê + phí quản lý theo đúng LoaiHinh
  // (Chế độ khách: các trường này đã bị server xoá trắng → tự về "Liên hệ")
  const giaChaoThue = giaChaoThue_(nx) || 'Liên hệ';

  const phiQuanLy = nx['PhiQuanLy (USD)']
    ? nx['PhiQuanLy (USD)'] + ' USD/m²/năm'
    : 'Liên hệ';

  const mau = ch.MauTinNhanZalo || MAU_TIN_MAC_DINH;

  const tin = String(mau)
    .replace(/{MaDonVi}/g,          nx.MaDonVi || '')
    .replace(/{TenNhaXuong}/g,      nx.TenNhaXuong || nx.MaDonVi || '')
    .replace(/{TenCum}/g,           (cum && cum.TenCum) || nx.MaCum || '')
    .replace(/{LoaiHinh}/g,         nx.LoaiHinh || '')
    .replace(/{DienTichDat}/g,      dinhDangSo(dienTichChinh_(nx), 'm²') || 'Liên hệ')
    .replace(/{DienTichXayDung}/g,  dinhDangSo(nx.DienTichXayDung || nx.DienTichXuong_m2, 'm²') || 'Liên hệ')
    .replace(/{DienTichVanPhong}/g, dinhDangSo(nx.DienTichVanPhong, 'm²') || '—')
    .replace(/{GiaThue}/g,          giaChaoThue)
    .replace(/{TrangThai}/g,        nx.TrangThai || '')
    .replace(/{TienDo}/g,           nx.TienDo || '')
    .replace(/{DienTichXuong_m2}/g,        dinhDangSo(nx.DienTichXuong_m2, 'm²') || 'Liên hệ')
    .replace(/{DienTichKhuDat_m2}/g,       dinhDangSo(nx.DienTichKhuDat_m2, 'm²') || 'Liên hệ')
    .replace(/{TongDienTichDatThue_m2}/g,  dinhDangSo(nx['Tong DienTichDatThue (m2)'], 'm²') || 'Liên hệ')
    .replace(/{DienTichDatThueThem_m2}/g,  dinhDangSo(nx['DienTichDatThueThem (m2)'], 'm²') || 'Liên hệ')
    .replaceAll('{TienThueXuong - DonGia (USD)}', giaChaoThue)
    .replaceAll('{PhiQuanLy (USD)}',              phiQuanLy)
    .replace(/{DanhSachLink}/g,     dsLink)
    .replace(/{LinkDinhVi}/g,       linkDinhVi)
    .replace(/{NguoiLienHe}/g,      ch.NguoiLienHe || NGUOI_DUNG.hoTen || '')
    .replace(/{SoDienThoai}/g,      ch.SoDienThoai || '')
    .replace(/{Email}/g,            ch.Email || NGUOI_DUNG.email || '')
    .replace(/{Website}/g,          ch.Website || '')
    // Dọn mọi placeholder còn sót để không hiển thị thẻ {...} thô cho khách
    .replace(/{[^{}]+}/g, '');

  document.getElementById('bcTinNhan').value = tin;
}

/* ---------- Sao chép ---------- */
function saoChepTinNhan() {
  const o = document.getElementById('bcTinNhan');
  o.select();
  o.setSelectionRange(0, 999999);

  const xong = function () {
    baoBrochure('✓ Đã sao chép. Mở Zalo và dán (Ctrl+V) vào cửa sổ chat.', 'ok');
  };

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(o.value).then(xong).catch(function () {
      document.execCommand('copy'); xong();
    });
  } else {
    document.execCommand('copy'); xong();
  }
}

/* ---------- Chia sẻ qua hệ thống (điện thoại -> chọn Zalo) ---------- */
function chiaSeHeThong() {
  const noiDung = document.getElementById('bcTinNhan').value;
  const tieuDe  = BC_DON_VI ? (BC_DON_VI.TenNhaXuong || BC_DON_VI.MaDonVi) : 'KCN Long Thành';

  if (navigator.share) {
    navigator.share({ title: tieuDe, text: noiDung })
      .then(function () { baoBrochure('✓ Đã mở bảng chia sẻ.', 'ok'); })
      .catch(function () { /* người dùng huỷ */ });
  } else {
    saoChepTinNhan();
    baoBrochure('⚠ Trình duyệt máy tính không hỗ trợ chia sẻ trực tiếp. '
      + 'Nội dung đã được sao chép — hãy mở Zalo và dán vào.', 'ok');
  }
}

/* ---------- Mở Zalo Web ---------- */
function moZaloWeb() {
  saoChepTinNhan();
  window.open('https://chat.zalo.me', '_blank', 'noopener');
  baoBrochure('✓ Đã sao chép nội dung và mở Zalo Web. Chọn khách hàng rồi dán (Ctrl+V).', 'ok');
}

/* ---------- Mã QR ---------- */
function hienMaQR() {
  if (!BC_DON_VI) return;
  const ds = layDanhSachTaiLieu(BC_DON_VI);
  if (ds.length === 0) {
    baoBrochure('⚠ Chưa có tài liệu để tạo mã QR.', 'loi');
    return;
  }
  const link = ds[0].link;
  document.getElementById('bcAnhQR').src =
    'https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=' + encodeURIComponent(link);
  document.getElementById('bcKhungQR').classList.remove('an');
  baoBrochure('', '');
}

function baoBrochure(msg, loai) {
  const el = document.getElementById('bcThongBao');
  el.className = 'thong-bao ' + (loai || '');
  el.textContent = msg;
}
</script>
